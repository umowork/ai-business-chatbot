version: "3.8"

services:
  bot:
    build: .
    container_name: ai-business-bot
    env_file:
      - .env
    environment:
      - MOCK_MODE=${MOCK_MODE:-true}
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://chatbot:chatbot@postgres:5432/chatbot}
    volumes:
      - ./documents:/app/documents
    restart: unless-stopped
    depends_on:
      - redis
      - postgres

  api:
    build: .
    container_name: ai-business-api
    command: python main.py --api
    env_file:
      - .env
    environment:
      - MOCK_MODE=${MOCK_MODE:-true}
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://chatbot:chatbot@postgres:5432/chatbot}
    ports:
      - "8000:8000"
    volumes:
      - ./documents:/app/documents
    restart: unless-stopped
    depends_on:
      - redis
      - postgres

  postgres:
    image: postgres:16-alpine
    container_name: ai-business-postgres
    environment:
      POSTGRES_USER: chatbot
      POSTGRES_PASSWORD: chatbot
      POSTGRES_DB: chatbot
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatbot"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ai-business-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  pgdata:
